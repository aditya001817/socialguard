version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: socialguard-postgres
    environment:
      POSTGRES_DB: socialguard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"

  redis:
    image: redis:7
    container_name: socialguard-redis
    ports:
      - "6379:6379"